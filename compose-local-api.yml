services:
  cdp-defra-id-stub:
    environment:
      APP_BASE_URL: http://localhost:3200
      OIDC_APP_BASE_URL: http://cdp-defra-id-stub:3200

  waste-organisation-backend:
    image: !reset null
    build:
      context: ../waste-organisation-backend/
      dockerfile: ../waste-organisation-backend/Dockerfile
      target: development
    volumes:
      - ../waste-organisation-backend/src:/home/node/src:z
      - ../waste-organisation-backend/package.json:/home/node/package.json:z
      - ../waste-organisation-backend/package-lock.json:/home/node/package-lock.json:z
