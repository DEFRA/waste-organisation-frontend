name: Check Pull Request

on:
  schedule:
    - cron: '0 7 * * 1'
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

jobs:
  pr-validator:
    name: Run Pull Request Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Test code and Create Test Coverage Reports
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: |
          npm ci
          npm audit --audit-level=high
          npm run build:frontend
          npm run format:check
          npm run lint
          npm test

      - name: Test Docker Image Build
        run: |
          set +e
          docker build --no-cache --tag cdp-node-frontend-template .
          exit $?

      - name: SonarCloud Scan
        if: github.actor != 'dependabot[bot]'
        uses: SonarSource/sonarqube-scan-action@v8.2.0 #  (or check latest version on https://github.com/marketplace/actions/official-sonarqube-scan)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  
  integration-tests:
    name: Run Integration Tests
    runs-on: ubuntu-latest
    needs: pr-validator
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Prepare compose environment
        env:
          GOV_NOTIFY_KEY: ${{ secrets.GOV_NOTIFY_KEY }}
          GOVPAY_API_KEY: ${{ secrets.GOVPAY_API_KEY }}
        run: |
          cat > .env <<EOF
          GOV_NOTIFY_KEY=${GOV_NOTIFY_KEY}
          GOVPAY_API_KEY=${GOVPAY_API_KEY}
          EOF

      - name: Cache external Docker images
        uses: actions/cache@v4
        id: external-docker-cache
        with:
          path: /tmp/external-images.tar
          key: integration-external-${{ hashFiles('compose.yml', 'compose-github.override.yml') }}

      - name: Pull Docker Compose images
        run: |
          set -euo pipefail

          COMPOSE_FILES="-f compose.yml -f compose-github.override.yml"
          COMPOSE_CONFIG="$(docker compose $COMPOSE_FILES config --format json)"

          CACHE_IMAGES="$(echo "$COMPOSE_CONFIG" | jq -r '
            .services
            | to_entries[]
            | select(.value.image != null and (.value.build == null))
            | select(.value.image | test(":latest$") | not)
            | .value.image
          ' | sort -u)"

          LATEST_SERVICES="$(echo "$COMPOSE_CONFIG" | jq -r '
            .services
            | to_entries[]
            | select(.value.image != null and (.value.build == null))
            | select(.value.image | test(":latest$"))
            | .key
          ' | sort -u)"

          echo "Pinned images to cache:"
          echo "$CACHE_IMAGES"
          echo "Latest-tagged services to pull fresh:"
          echo "$LATEST_SERVICES"

          if [ "${{ steps.external-docker-cache.outputs.cache-hit }}" = "true" ]; then
            echo "Restoring pinned images from cache"
            docker load -i /tmp/external-images.tar
          elif [ -n "$CACHE_IMAGES" ]; then
            echo "Pulling and caching pinned images"
            echo "$CACHE_IMAGES" | xargs docker pull
            echo "$CACHE_IMAGES" | xargs docker save -o /tmp/external-images.tar
          fi

          if [ -n "$LATEST_SERVICES" ]; then
            echo "$LATEST_SERVICES" | xargs docker compose $COMPOSE_FILES pull
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Frontend Image with Layer Cache
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: development
          load: true
          tags: waste-organisation-frontend-waste-organisation-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start Docker Compose Services
        id: start-docker-compose-services
        env:
          COMPOSE_PROJECT_NAME: waste-organisation-frontend
        run: docker compose -f compose.yml -f compose-github.override.yml up -d --no-build

      - name: Checkout UAT Repository as Integration Test Suite
        uses: actions/checkout@v6
        with:
          repository: DEFRA/digital-waste-tracking-fe-uat
          path: integration-tests

      - name: Setup Node.js for Integration Test Suite
        uses: actions/setup-node@v6
        with:
          node-version-file: integration-tests/.nvmrc
          cache: npm
          cache-dependency-path: integration-tests/package-lock.json

      - name: Install Integration Test Dependencies
        working-directory: integration-tests
        run: npm ci --ignore-scripts

      - name: Wait for Docker Compose Services
        id: wait-for-docker-compose-services
        if: steps.start-docker-compose-services.outcome == 'success'
        env:
          COMPOSE_PROJECT_NAME: waste-organisation-frontend
        run: |
          docker compose -f compose.yml -f compose-github.override.yml wait
          docker compose -f compose.yml -f compose-github.override.yml ps

      - name: Run Integration Tests
        id: integration-tests
        if: steps.wait-for-docker-compose-services.outcome == 'success'
        working-directory: integration-tests
        env:
          ORGANISATION_BACKEND_PASSWORD: ${{ secrets.ORGANISATION_BACKEND_PASSWORD }}
          ENVIRONMENT: local
        run: |
          npm run test

      - name: Generate Test Report
        if: always()
        id: generate-report
        working-directory: integration-tests
        run: npm run report:generate

      - name: Upload Test Report
        if: always() && steps.generate-report.outcome == 'success'
        id: upload-report
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-report
          path: integration-tests/allure-report/
          retention-days: 30

      - name: Comment Test Report Link on PR
        if: always() && steps.upload-report.outcome == 'success' && github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const statusEmoji = '${{ steps.integration-tests.outcome }}' === 'success' ? '✅' : '❌';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 📊 Integration Test Report ${statusEmoji}\n\nThe test report has been generated and is available as an artifact.\n\n📥 [Download Test Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/${{ steps.upload-report.outputs.artifact-id }})`
            })

      - name: Stop Docker Compose Services
        if: always() && steps.start-docker-compose-services.outcome == 'success'
        env:
          COMPOSE_PROJECT_NAME: waste-organisation-frontend
        run: docker compose -f compose.yml -f compose-github.override.yml down

